name: TV Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

      - name: Generate TV packages
        run: npm run tv:package

      - name: Upload TV package folders
        uses: actions/upload-artifact@v4
        with:
          name: channelforge-tv-packages
          path: dist-tv/
          if-no-files-found: error
